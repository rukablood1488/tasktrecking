<header class="topbar">

  <nav class="topbar__breadcrumbs" aria-label="Навігація">
    {% block breadcrumbs %}
      <a href="{% url 'workspace-list' %}" class="topbar__crumb">Простори</a>
    {% endblock %}
  </nav>

  <form class="topbar__search" action="{% url 'task-list' %}" method="GET" role="search">
    <span class="topbar__search-icon" aria-hidden="true">
      <svg class="icon icon--sm"><use href="#icon-search"/></svg>
    </span>
    <input type="search" name="q" class="topbar__search-input"
           placeholder="Пошук завдань..." value="{{ request.GET.q }}" autocomplete="off" />
  </form>

  <div class="topbar__actions">
    {% block topbar_actions %}{% endblock %}

    <button class="topbar__icon-btn" title="Сповіщення" aria-label="Сповіщення">
      <svg class="icon icon--md"><use href="#icon-bell"/></svg>
    </button>

    <div class="topbar__user-menu" id="userMenu">
      <button class="topbar__avatar" id="userMenuToggle" aria-expanded="false" aria-haspopup="true">
        {{ user.username|first|upper }}
      </button>
      <div class="topbar__dropdown" id="userDropdown" role="menu">
        <div class="topbar__dropdown-header">
          <strong>{{ user.get_full_name|default:user.username }}</strong>
          <small>{{ user.email }}</small>
        </div>
        <hr class="topbar__dropdown-divider" />
        <form method="POST" action="{% url 'logout' %}">
          {% csrf_token %}
          <button type="submit" class="topbar__dropdown-item topbar__dropdown-item--danger" role="menuitem">
            <svg class="icon icon--sm" aria-hidden="true"><use href="#icon-log-out"/></svg>
            Вийти
          </button>
        </form>
      </div>
    </div>
  </div>
</header>

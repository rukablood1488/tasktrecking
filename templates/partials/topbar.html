<header class="topbar">

  
  <nav class="topbar__breadcrumbs" aria-label="Навігація">
    {% block breadcrumbs %}
      <a href="{% url 'workspace-list' %}" class="topbar__crumb">Простори</a>
    {% endblock %}
  </nav>

  
  <form class="topbar__search" action="{% url 'task-list' %}" method="GET">
    <span class="topbar__search-icon">🔍</span>
    <input
      type="search"
      name="q"
      class="topbar__search-input"
      placeholder="Пошук завдань..."
      value="{{ request.GET.q }}"
      autocomplete="off"
    />
  </form>

  
  <div class="topbar__actions">
    {% block topbar_actions %}{% endblock %}

    
    <button class="topbar__icon-btn" title="Сповіщення">🔔</button>

    
    <div class="topbar__user-menu" id="userMenu">
      <button class="topbar__avatar" id="userMenuToggle">
        {{ user.username|first|upper }}
      </button>
      <div class="topbar__dropdown" id="userDropdown">
        <div class="topbar__dropdown-header">
          <strong>{{ user.get_full_name|default:user.username }}</strong>
          <small>{{ user.email }}</small>
        </div>
        <hr class="topbar__dropdown-divider" />
        <a href="{% url 'logout' %}" class="topbar__dropdown-item topbar__dropdown-item--danger">
          ⏻ Вийти
        </a>
      </div>
    </div>

  </div>
</header>
